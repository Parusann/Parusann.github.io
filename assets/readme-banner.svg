  <text x="74" y="238" fill="url(#accent)" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700">Portfolio Repository</text>

  <text x="74" y="304" fill="#A7B8B3" font-family="'Segoe UI', Arial, sans-serif" font-size="26">
