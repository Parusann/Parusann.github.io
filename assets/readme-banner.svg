    <rect x="822" y="140" width="344" height="42" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(115,217,106,0.14)"/>
    <circle cx="846" cy="161" r="6" fill="#FF5F57"/>
    <circle cx="868" cy="161" r="6" fill="#FFBD2E"/>
