<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Parusan Natheeswaran portfolio banner</title>
  <desc id="desc">Paper-styled README banner for the Parusan Natheeswaran portfolio repository, drawn in the site's field-notes visual language.</desc>

  <!-- paper sheet -->
  <rect width="1280" height="640" fill="#F3F0E8"/>

  <!-- faint pen-green grid -->
  <g stroke="rgba(31,107,69,0.08)" stroke-width="1">
    <path d="M80 0V640"/><path d="M160 0V640"/><path d="M240 0V640"/><path d="M320 0V640"/><path d="M400 0V640"/><path d="M480 0V640"/><path d="M560 0V640"/><path d="M640 0V640"/><path d="M720 0V640"/><path d="M800 0V640"/><path d="M880 0V640"/><path d="M960 0V640"/><path d="M1040 0V640"/><path d="M1120 0V640"/><path d="M1200 0V640"/>
    <path d="M0 80H1280"/><path d="M0 160H1280"/><path d="M0 240H1280"/><path d="M0 320H1280"/><path d="M0 400H1280"/><path d="M0 480H1280"/><path d="M0 560H1280"/>
  </g>

  <!-- top bar -->
  <path d="M0 56H1280" stroke="rgba(27,33,29,0.16)"/>
  <text x="48" y="36" fill="#1B211D" font-family="'JetBrains Mono', Consolas, monospace" font-size="17" font-weight="700">parusan.dev_</text>
  <text x="1232" y="35" text-anchor="end" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="13">parusann.github.io</text>

  <!-- kicker -->
  <text x="72" y="128" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="15" letter-spacing="1">parusan.dev — field notes of a computer engineer</text>

  <!-- name -->
  <text x="68" y="240" fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-size="96" font-weight="500">Parusan</text>
  <text x="68" y="342" fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-size="96" font-weight="500">Natheeswaran</text>

  <!-- tagline -->
  <text x="72" y="402" fill="#4A554E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="24">Computer Engineering student building <tspan fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-style="italic">AI-driven</tspan>,</text>
  <text x="72" y="436" fill="#4A554E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="24">full-stack, and scalable backend systems.</text>

  <!-- status -->
  <circle cx="78" cy="474" r="4.5" fill="#1F6B45" opacity="0.9"/>
  <text x="92" y="480" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="15">Seeking internship &amp; co-op opportunities</text>

  <!-- buttons -->
  <g>
    <rect x="72" y="508" width="198" height="48" rx="10" fill="#141A16"/>
    <text x="171" y="538" text-anchor="middle" fill="#F3F0E8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="16" font-weight="600">View projects ↓</text>
    <rect x="286.5" y="508.5" width="169" height="47" rx="10" fill="#FBF9F3" stroke="rgba(27,33,29,0.34)"/>
    <text x="371" y="538" text-anchor="middle" fill="#1B211D" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="16" font-weight="600">Get in touch</text>
  </g>

  <!-- framed figure: pipeline schematic on a sage mount -->
  <g>
    <rect x="816" y="92" width="400" height="440" rx="8" fill="#BFD5C4"/>
    <rect x="832" y="108" width="368" height="376" fill="#FBF9F3" stroke="rgba(27,33,29,0.10)"/>
    <g stroke="rgba(31,107,69,0.08)" stroke-width="1">
      <path d="M832 180H1200"/><path d="M832 260H1200"/><path d="M832 340H1200"/><path d="M832 420H1200"/>
      <path d="M912 108V484"/><path d="M992 108V484"/><path d="M1072 108V484"/><path d="M1152 108V484"/>
    </g>
    <text x="852" y="140" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12" letter-spacing="1.5">PULSAR-V — 5-STAGE PIPELINE</text>

    <!-- forwarding arcs -->
    <path d="M1014 196 C 980 168, 924 168, 900 196" stroke="#1F6B45" stroke-width="1.4" stroke-dasharray="3 3" opacity="0.75"/>
    <path d="M1078 196 C 1030 156, 940 156, 902 194" stroke="#1F6B45" stroke-width="1.4" stroke-dasharray="3 3" opacity="0.55"/>

    <!-- pipeline stages -->
    <g font-family="'JetBrains Mono', Consolas, monospace" font-size="13" font-weight="700">
      <rect x="852" y="200" width="52" height="40" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="878" y="225" text-anchor="middle" fill="#1B211D">IF</text>
      <path d="M904 220H916" stroke="#1F6B45" stroke-width="1.5"/><path d="M916 220l-4 -3v6z" fill="#1F6B45"/>
      <rect x="918" y="200" width="52" height="40" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="944" y="225" text-anchor="middle" fill="#1B211D">ID</text>
      <path d="M970 220H982" stroke="#1F6B45" stroke-width="1.5"/><path d="M982 220l-4 -3v6z" fill="#1F6B45"/>
      <rect x="984" y="200" width="52" height="40" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="1010" y="225" text-anchor="middle" fill="#1B211D">EX</text>
      <path d="M1036 220H1048" stroke="#1F6B45" stroke-width="1.5"/><path d="M1048 220l-4 -3v6z" fill="#1F6B45"/>
      <rect x="1050" y="200" width="56" height="40" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="1078" y="225" text-anchor="middle" fill="#1B211D">MEM</text>
      <path d="M1106 220H1118" stroke="#1F6B45" stroke-width="1.5"/><path d="M1118 220l-4 -3v6z" fill="#1F6B45"/>
      <rect x="1120" y="200" width="52" height="40" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="1146" y="225" text-anchor="middle" fill="#1B211D">WB</text>
    </g>

    <!-- hazard / regfile row -->
    <rect x="884" y="272" width="264" height="36" rx="4" stroke="rgba(27,33,29,0.34)" stroke-dasharray="4 3" fill="none"/>
    <text x="1016" y="295" text-anchor="middle" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12">hazard unit · regfile · forwarding</text>
    <path d="M944 272V246" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>
    <path d="M1010 272V246" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>
    <path d="M1078 272V246" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>

    <!-- verification notes -->
    <text x="852" y="352" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="13">riscv-formal 43/43 · arch-tests 39/39</text>
    <text x="852" y="376" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="13">38.8 MHz post-route · ECP5-85F</text>

    <!-- terminal plate -->
    <rect x="852" y="404" width="296" height="44" rx="6" fill="#0E1210"/>
    <text x="868" y="431" fill="#62C97A" font-family="'JetBrains Mono', Consolas, monospace" font-size="13">$ make verify → ALL PASS</text>
  </g>
  <text x="816" y="560" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="13">fig. 01 — five-stage pipeline, drawn in pen-green ink.</text>

  <!-- bottom ticker -->
  <path d="M0 592H1280" stroke="rgba(27,33,29,0.16)"/>
  <text x="72" y="622" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5" letter-spacing="1.5">APPLIED AI <tspan fill="#1F6B45">·</tspan> SCALABLE BACKENDS <tspan fill="#1F6B45">·</tspan> SYSTEMS DESIGN <tspan fill="#1F6B45">·</tspan> LLM INTEGRATION <tspan fill="#1F6B45">·</tspan> REACT &amp; TYPESCRIPT <tspan fill="#1F6B45">·</tspan> DOCKER &amp; DEVOPS</text>

  <!-- sheet border -->
  <rect x="0.5" y="0.5" width="1279" height="639" stroke="rgba(27,33,29,0.34)"/>
</svg>
