    <path d="M360 0V640" stroke="#17352B"/>
    <path d="M480 0V640" stroke="#17352B"/>
    <path d="M600 0V640" stroke="#17352B"/>
    <path d="M720 0V640" stroke="#17352B"/>
    <path d="M840 0V640" stroke="#17352B"/>
    <path d="M960 0V640" stroke="#17352B"/>
    <path d="M1080 0V640" stroke="#17352B"/>
    <path d="M1200 0V640" stroke="#17352B"/>
