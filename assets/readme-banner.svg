    <text x="848" y="268" fill="#B4C2BE" font-family="'Segoe UI', Arial, sans-serif" font-size="14">AI language decoding</text>
    <text x="848" y="292" fill="#B4C2BE" font-family="'Segoe UI', Arial, sans-serif" font-size="14">with local LLM workflows</text>

    <rect x="992" y="204" width="174" height="110" rx="18" fill="rgba(217,163,58,0.11)" stroke="rgba(217,163,58,0.22)"/>
    <text x="1018" y="238" fill="#E0B95B" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700">Bingery</text>
    <text x="1018" y="268" fill="#B4C2BE" font-family="'Segoe UI', Arial, sans-serif" font-size="14">AI recommendations,</text>
    <text x="1018" y="292" fill="#B4C2BE" font-family="'Segoe UI', Arial, sans-serif" font-size="14">search, and full-stack APIs</text>

    <rect x="822" y="336" width="344" height="172" rx="22" fill="rgba(10,19,17,0.86)" stroke="rgba(115,217,106,0.14)"/>
    <text x="850" y="372" fill="#73D96A" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700">// engineering profile</text>
    <text x="850" y="406" fill="#EAF4E8" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600">Applied AI</text>
    <text x="850" y="438" fill="#EAF4E8" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600">Scalable backends</text>
    <text x="850" y="470" fill="#EAF4E8" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600">Product-minded full-stack development</text>
    <text x="850" y="498" fill="#91A5A0" font-family="'Segoe UI', Arial, sans-serif" font-size="14">Custom static site with canvas effects, motion,</text>
    <text x="850" y="519" fill="#91A5A0" font-family="'Segoe UI', Arial, sans-serif" font-size="14">glassmorphism, responsive layouts, and curated case studies.</text>
