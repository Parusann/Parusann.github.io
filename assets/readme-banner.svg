<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Parusan Natheeswaran portfolio banner</title>
  <desc id="desc">Decorative README banner for the Parusan Natheeswaran portfolio repository.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1160" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07100E"/>
      <stop offset="0.55" stop-color="#0D1915"/>
      <stop offset="1" stop-color="#101713"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 230) rotate(43.4526) scale(448.631 328.405)">
      <stop stop-color="#2E8F52" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2E8F52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 190) rotate(113.543) scale(366.819 290.347)">
      <stop stop-color="#D9A33A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D9A33A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#73D96A"/>
      <stop offset="1" stop-color="#D9A33A"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="rgba(115,217,106,0.35)"/>
      <stop offset="1" stop-color="rgba(217,163,58,0.28)"/>
    </linearGradient>
    <filter id="blur" x="-120" y="-120" width="1520" height="880" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <g opacity="0.42">
