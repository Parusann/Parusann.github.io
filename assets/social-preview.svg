<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Parusan Natheeswaran social preview</title>
  <desc id="desc">Paper-styled social preview for the portfolio repository, drawn in the site's field-notes visual language.</desc>

  <!-- paper sheet -->
  <rect width="1200" height="630" fill="#F3F0E8"/>

  <!-- faint pen-green grid -->
  <g stroke="rgba(31,107,69,0.08)" stroke-width="1">
    <path d="M80 0V630"/><path d="M160 0V630"/><path d="M240 0V630"/><path d="M320 0V630"/><path d="M400 0V630"/><path d="M480 0V630"/><path d="M560 0V630"/><path d="M640 0V630"/><path d="M720 0V630"/><path d="M800 0V630"/><path d="M880 0V630"/><path d="M960 0V630"/><path d="M1040 0V630"/><path d="M1120 0V630"/>
    <path d="M0 80H1200"/><path d="M0 160H1200"/><path d="M0 240H1200"/><path d="M0 320H1200"/><path d="M0 400H1200"/><path d="M0 480H1200"/><path d="M0 560H1200"/>
  </g>

  <!-- top bar -->
  <path d="M0 52H1200" stroke="rgba(27,33,29,0.16)"/>
  <text x="44" y="33" fill="#1B211D" font-family="'JetBrains Mono', Consolas, monospace" font-size="16" font-weight="700">parusan.dev_</text>
  <text x="1156" y="32" text-anchor="end" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5">parusann.github.io</text>

  <!-- kicker -->
  <text x="64" y="118" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="14" letter-spacing="1">parusan.dev — field notes of a computer engineer</text>

  <!-- name -->
  <text x="60" y="212" fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-size="80" font-weight="500">Parusan</text>
  <text x="60" y="298" fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-size="80" font-weight="500">Natheeswaran</text>

  <!-- tagline -->
  <text x="64" y="352" fill="#4A554E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="22">Computer Engineering student building <tspan fill="#1B211D" font-family="'Newsreader', Georgia, serif" font-style="italic">AI-driven</tspan>,</text>
  <text x="64" y="384" fill="#4A554E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="22">full-stack, and scalable backend systems.</text>

  <!-- status -->
  <circle cx="70" cy="420" r="4" fill="#1F6B45" opacity="0.9"/>
  <text x="84" y="426" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="14">Seeking internship &amp; co-op opportunities</text>

  <!-- buttons -->
  <g>
    <rect x="64" y="452" width="182" height="44" rx="9" fill="#141A16"/>
    <text x="155" y="480" text-anchor="middle" fill="#F3F0E8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="15" font-weight="600">View projects ↓</text>
    <rect x="262.5" y="452.5" width="155" height="43" rx="9" fill="#FBF9F3" stroke="rgba(27,33,29,0.34)"/>
    <text x="340" y="480" text-anchor="middle" fill="#1B211D" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="15" font-weight="600">Get in touch</text>
  </g>

  <!-- framed figure: pipeline schematic on a sage mount -->
  <g>
    <rect x="776" y="84" width="360" height="408" rx="8" fill="#BFD5C4"/>
    <rect x="792" y="100" width="328" height="344" fill="#FBF9F3" stroke="rgba(27,33,29,0.10)"/>
    <g stroke="rgba(31,107,69,0.08)" stroke-width="1">
      <path d="M792 172H1120"/><path d="M792 252H1120"/><path d="M792 332H1120"/>
      <path d="M872 100V444"/><path d="M952 100V444"/><path d="M1032 100V444"/>
    </g>
    <text x="812" y="132" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" letter-spacing="1.5">PULSAR-V — 5-STAGE PIPELINE</text>

    <!-- forwarding arcs -->
    <path d="M974 186 C 940 160, 890 160, 866 186" stroke="#1F6B45" stroke-width="1.3" stroke-dasharray="3 3" opacity="0.75"/>
    <path d="M1036 186 C 990 148, 906 148, 868 184" stroke="#1F6B45" stroke-width="1.3" stroke-dasharray="3 3" opacity="0.55"/>

    <!-- pipeline stages -->
    <g font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5" font-weight="700">
      <rect x="812" y="190" width="48" height="38" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="836" y="214" text-anchor="middle" fill="#1B211D">IF</text>
      <path d="M860 209H870" stroke="#1F6B45" stroke-width="1.5"/><path d="M870 209l-4 -3v6z" fill="#1F6B45"/>
      <rect x="872" y="190" width="48" height="38" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="896" y="214" text-anchor="middle" fill="#1B211D">ID</text>
      <path d="M920 209H930" stroke="#1F6B45" stroke-width="1.5"/><path d="M930 209l-4 -3v6z" fill="#1F6B45"/>
      <rect x="932" y="190" width="48" height="38" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="956" y="214" text-anchor="middle" fill="#1B211D">EX</text>
      <path d="M980 209H990" stroke="#1F6B45" stroke-width="1.5"/><path d="M990 209l-4 -3v6z" fill="#1F6B45"/>
      <rect x="992" y="190" width="54" height="38" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="1019" y="214" text-anchor="middle" fill="#1B211D">MEM</text>
      <path d="M1046 209H1056" stroke="#1F6B45" stroke-width="1.5"/><path d="M1056 209l-4 -3v6z" fill="#1F6B45"/>
      <rect x="1058" y="190" width="48" height="38" rx="4" stroke="#1F6B45" stroke-width="1.5" fill="none"/>
      <text x="1082" y="214" text-anchor="middle" fill="#1B211D">WB</text>
    </g>

    <!-- hazard / regfile row -->
    <rect x="836" y="258" width="246" height="34" rx="4" stroke="rgba(27,33,29,0.34)" stroke-dasharray="4 3" fill="none"/>
    <text x="959" y="280" text-anchor="middle" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5">hazard unit · regfile · forwarding</text>
    <path d="M896 258V228" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>
    <path d="M956 258V228" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>
    <path d="M1019 258V228" stroke="rgba(27,33,29,0.34)" stroke-width="1"/>

    <!-- verification notes -->
    <text x="812" y="330" fill="#1F6B45" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5">riscv-formal 43/43 · arch-tests 39/39</text>
    <text x="812" y="352" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5">38.8 MHz post-route · ECP5-85F</text>

    <!-- terminal plate -->
    <rect x="812" y="376" width="280" height="42" rx="6" fill="#0E1210"/>
    <text x="828" y="402" fill="#62C97A" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5">$ make verify → ALL PASS</text>
  </g>
  <text x="776" y="520" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12.5">fig. 01 — five-stage pipeline, pen-green ink.</text>

  <!-- bottom ticker -->
  <path d="M0 582H1200" stroke="rgba(27,33,29,0.16)"/>
  <text x="64" y="612" fill="#5F6B62" font-family="'JetBrains Mono', Consolas, monospace" font-size="12" letter-spacing="1.5">APPLIED AI <tspan fill="#1F6B45">·</tspan> SCALABLE BACKENDS <tspan fill="#1F6B45">·</tspan> SYSTEMS DESIGN <tspan fill="#1F6B45">·</tspan> LLM INTEGRATION <tspan fill="#1F6B45">·</tspan> REACT &amp; TYPESCRIPT</text>

  <!-- sheet border -->
  <rect x="0.5" y="0.5" width="1199" height="629" stroke="rgba(27,33,29,0.34)"/>
</svg>
